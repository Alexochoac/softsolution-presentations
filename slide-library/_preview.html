<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineScanner — Slide Library Preview · Softsolution</title>
<!--
  SLIDE LIBRARY PREVIEW
  Slides are loaded dynamically from: linescanner/slide-0X-*.html
  REQUIRES Live Server (right-click → Open with Live Server in VS Code).
  Does NOT work when opened as file:// — fetch() is blocked by the browser.
  Image paths are rewritten automatically: assets/ → linescanner/Slide Images/
-->

<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  UMAMI ANALYTICS — ACTION REQUIRED BEFORE PUBLISHING            ║
  ║                                                                  ║
  ║  1. Create a new Website in your Umami dashboard                 ║
  ║  2. Copy the Website ID (UUID)                                   ║
  ║  3. Uncomment the <script> tag below                             ║
  ║  4. Replace [UMAMI-WEBSITE-ID] with your actual UUID             ║
  ║                                                                  ║
  ║  Tracked automatically once enabled:                             ║
  ║    • Page views per slide (slide-view event)                     ║
  ║    • Carousel navigation (carousel-next / carousel-prev)         ║
  ║    • Image zoom / lightbox opens (image-zoom)                    ║
  ║    • CTA step clicks (cta-step)                                  ║
  ╚══════════════════════════════════════════════════════════════════╝

  <script defer src="https://cloud.umami.is/script.js"
          data-website-id="[UMAMI-WEBSITE-ID]"></script>
-->
<style>
  /* ═══════════════════════════════════════
     SOFTSOLUTION BRAND — COLOR VARIABLES
  ═══════════════════════════════════════ */
  :root {
    --accent:        #F5A623;
    --accent-mid:    #E8890C;
    --accent-light:  #FFD27F;
    --accent-rgb:    245,166,35;
    --bg:            #000;
    --bg-card:       rgba(255,255,255,.03);
    --bg-card-hover: rgba(245,166,35,.06);
    --text:          #ffffff;
    --text-muted:    #aaa;
    --border:        rgba(255,255,255,.07);
    --border-hover:  rgba(245,166,35,.32);
    --nav-bg:        rgba(0,0,0,.65);
    --nav-border:    rgba(255,255,255,.07);
    --dot-inactive:  rgba(255,255,255,.18);
    --counter:       #333;
    --orb-a:         rgba(245,166,35,.10);
    --orb-b:         rgba(232,137,12,.07);
  }

  /* ═══════════════════════════════════════
     BASE RESET & BODY
  ═══════════════════════════════════════ */
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: radial-gradient(ellipse at center, #0d0d0d 0%, #000 100%);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════════════════════════════════
     KEYFRAMES
  ═══════════════════════════════════════ */
  @keyframes float  { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-30px) scale(1.05)} }
  @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
  @keyframes blink  { 0%,100%{opacity:.35} 50%{opacity:1} }

  /* ═══════════════════════════════════════
     SLIDE SYSTEM
  ═══════════════════════════════════════ */
  .slides-container { position:relative; width:100vw; height:100dvh; overflow:hidden; }
  .slide {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    opacity:0; pointer-events:none;
    transition: opacity .7s cubic-bezier(.25,.46,.45,.94), transform .7s cubic-bezier(.25,.46,.45,.94);
    transform: scale(.98);
    overflow-y:auto; overflow-x:hidden;
  }
  .slide.active  { opacity:1; pointer-events:auto; transform:scale(1); }
  .slide.exit-left  { opacity:0; transform:scale(.97) translateX(-20px); }
  .slide.exit-right { opacity:0; transform:scale(.97) translateX(20px); }

  /* ═══════════════════════════════════════
     GLOW ORBS
  ═══════════════════════════════════════ */
  .glow-orb { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; animation:float 12s ease-in-out infinite; }
  .glow-orb.a { width:500px; height:500px; background:radial-gradient(circle,var(--orb-a) 0%,transparent 70%); right:-200px; bottom:-200px; }
  .glow-orb.b { width:400px; height:400px; background:radial-gradient(circle,var(--orb-b) 0%,transparent 70%); left:-150px; top:-150px; animation-delay:-6s; }

  /* ═══════════════════════════════════════
     HERO SLIDE
  ═══════════════════════════════════════ */
  .slide.hero {
    justify-content:flex-end; align-items:flex-start;
    padding:0 80px 80px 80px;
    overflow:hidden;
    background:#000;
  }
  .hero-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  .hero-overlay {
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(to top, rgba(0,0,0,.97) 0%, rgba(0,0,0,.55) 55%, rgba(0,0,0,.15) 100%);
  }
  .hero-content { position:relative; z-index:2; }
  .hero-logo { position:absolute; top:36px; left:80px; z-index:3; height:36px; width:auto; filter:brightness(0) invert(1); opacity:.75; }
  .softsolution-credit { position:absolute; top:42px; right:80px; z-index:3; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.28); }

  .brand-badge {
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(245,166,35,.12); border:1px solid rgba(245,166,35,.35);
    border-radius:100px; padding:7px 18px;
    font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#F5A623;
    margin-bottom:18px;
  }
  .brand-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:#F5A623; animation:pulse 2s ease-in-out infinite; }

  .hero-content h1 {
    font-size:clamp(38px,5.5vw,72px);
    font-weight:700; letter-spacing:-.02em; line-height:1.06; margin-bottom:16px; color:#fff;
  }
  .hero-content h2 { font-size:clamp(16px,1.8vw,22px); font-weight:400; color:rgba(255,255,255,.60); line-height:1.5; }
  .click-hint { margin-top:36px; font-size:13px; color:rgba(255,255,255,.22); letter-spacing:.10em; text-transform:uppercase; font-weight:600; animation:blink 2s ease-in-out infinite; }

  /* ── Gradient text helpers ── */
  /* In Softsolution preview: .blue renders with amber gradient */
  .blue, .amber {
    background:linear-gradient(90deg, #F5A623 0%, #FFD27F 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    display:inline-block;
  }
  .slide.hero .blue, .slide.hero .amber {
    background:linear-gradient(90deg, #F5A623 0%, #FFD27F 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  /* ═══════════════════════════════════════
     CONTENT SLIDES
  ═══════════════════════════════════════ */
  .slide.content {
    padding:60px 80px 80px;
    padding-bottom: 80px !important; /* always clear the nav bar — overrides inline padding:...0 */
    background:radial-gradient(ellipse at center, #0d0d0d 0%, #000 100%);
  }
  .slide-logo { position:absolute; top:22px; left:36px; z-index:5; height:24px; width:auto; opacity:.40; filter:brightness(0) invert(1); transition:opacity .3s; }
  .slide-logo:hover { opacity:.75; }

  /* Dual logo row used on content slides (SoftSolution + LiteSentry) */
  .slide-logo-row {
    position:absolute; top:20px; left:36px; z-index:5;
    display:flex; align-items:center; gap:10px; pointer-events:none;
  }
  .slide-logo-row img:first-child {
    height:22px; width:auto; opacity:.38; filter:brightness(0) invert(1);
    transition:opacity .3s; pointer-events:auto;
  }
  .slide-logo-row:hover img:first-child { opacity:.68; }
  .slide-logo-sep { width:1px; height:24px; background:rgba(255,255,255,.14); flex-shrink:0; display:block; }
  .slide-logo-ls  { height:40px; width:auto; filter:grayscale(1) brightness(2); opacity:.38; }

  .section-label { font-size:11px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; text-align:center; }
  .divider { width:36px; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent-light)); border-radius:2px; margin:0 auto 24px; }

  h1.slide-title {
    font-size:clamp(26px,4vw,50px); font-weight:700; letter-spacing:-.02em; line-height:1.1; margin-bottom:8px;
    background:linear-gradient(180deg,#fff 0%,#aaa 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    text-align:center;
  }
  .slide-subtitle { font-size:clamp(13px,1.5vw,17px); color:var(--text-muted); text-align:center; line-height:1.55; }

  /* ═══════════════════════════════════════
     KPI ROW
  ═══════════════════════════════════════ */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; width:100%; max-width:900px; margin:24px auto 0; }
  .kpi-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:16px; padding:24px 16px; text-align:center; transition:all .3s ease;
  }
  .kpi-card:hover { background:var(--bg-card-hover); border-color:var(--border-hover); transform:translateY(-2px); }
  .kpi-value {
    font-size:clamp(26px,3vw,42px); font-weight:900; line-height:1; margin-bottom:8px;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent-light) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .kpi-label { font-size:12px; color:var(--text-muted); font-weight:600; letter-spacing:.03em; line-height:1.4; }

  /* ═══════════════════════════════════════
     FEATURE CARDS (3-COL)
  ═══════════════════════════════════════ */
  .cards-row { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; width:100%; max-width:1000px; margin:24px auto 0; }
  .card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:18px; padding:28px 24px; transition:all .3s ease;
  }
  .card:hover { background:var(--bg-card-hover); border-color:var(--border-hover); transform:translateY(-3px); }
  .card-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent-mid)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:16px; }
  .card-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; }
  .card-desc { font-size:13px; color:var(--text-muted); line-height:1.65; }

  /* ═══════════════════════════════════════
     FEATURE LIST (NUMBERED STEPS)
  ═══════════════════════════════════════ */
  .feature-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:860px; margin:20px auto 0; }
  .feature-item {
    display:flex; align-items:flex-start; gap:14px;
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:14px; padding:16px 20px; transition:border-color .25s;
  }
  .feature-item:hover { border-color:var(--border-hover); }
  .feature-num {
    min-width:28px; height:28px;
    background:linear-gradient(135deg,var(--accent),var(--accent-mid));
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#000; flex-shrink:0; margin-top:2px;
  }
  .feature-text { font-size:14px; color:var(--text-muted); line-height:1.65; }
  .feature-text strong { color:var(--text); font-weight:700; }

  /* ═══════════════════════════════════════
     TAG GRID
  ═══════════════════════════════════════ */
  .tag-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:16px auto 0; max-width:820px; }
  .tag {
    font-size:13px; font-weight:700; padding:8px 18px; border-radius:100px;
    background:rgba(var(--accent-rgb),.10); border:1px solid rgba(var(--accent-rgb),.22);
    color:var(--accent); transition:all .25s; cursor:default;
  }
  .tag:hover { background:rgba(var(--accent-rgb),.20); border-color:rgba(var(--accent-rgb),.45); }
  .tag.error { background:rgba(248,113,113,.10); border-color:rgba(248,113,113,.22); color:#f87171; }
  .tag.warn  { background:rgba(245,166,35,.10);  border-color:rgba(245,166,35,.22);  color:#f5a623; }
  .tag.ok    { background:rgba(52,199,89,.10);   border-color:rgba(52,199,89,.22);   color:#34c759; }

  /* ═══════════════════════════════════════
     TWO COLUMN
  ═══════════════════════════════════════ */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:24px; width:100%; max-width:1000px; margin:24px auto 0; }
  .col-card { background:var(--bg-card); border:1px solid var(--border); border-radius:18px; padding:28px 24px; }
  .col-label { font-size:11px; font-weight:700; letter-spacing:.10em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
  .col-list { display:flex; flex-direction:column; gap:10px; }
  .col-item { display:flex; align-items:flex-start; gap:10px; font-size:14px; color:var(--text-muted); line-height:1.5; }
  .col-item::before { content:'›'; color:var(--accent); font-weight:700; font-size:17px; line-height:1.3; flex-shrink:0; }
  .col-item strong { color:var(--text); }

  /* ═══════════════════════════════════════
     INTEGRATION GRID
  ═══════════════════════════════════════ */
  .integration-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:860px; margin:24px auto 0; }
  .int-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:14px; padding:20px 16px; text-align:center; transition:all .3s ease;
  }
  .int-card:hover { background:var(--bg-card-hover); border-color:var(--border-hover); transform:translateY(-2px); }
  .int-name { font-size:15px; font-weight:700; color:var(--text); }
  .int-type { font-size:11px; color:var(--text-muted); margin-top:4px; }

  /* ═══════════════════════════════════════
     CTA BOX
  ═══════════════════════════════════════ */
  .cta-box {
    background:linear-gradient(135deg,rgba(var(--accent-rgb),.10),rgba(var(--accent-rgb),.03));
    border:1px solid rgba(var(--accent-rgb),.22);
    border-radius:24px; padding:36px 44px; text-align:center; max-width:680px; margin:24px auto 0;
  }
  .cta-box p { font-size:15px; color:var(--text-muted); line-height:1.85; }
  .cta-box strong { color:var(--text); }
  .cta-steps { display:flex; flex-direction:column; gap:10px; margin:18px 0; text-align:left; }
  .cta-step { display:flex; align-items:center; gap:12px; font-size:14px; color:var(--text-muted); }
  .step-num {
    min-width:26px; height:26px;
    background:linear-gradient(135deg,var(--accent),var(--accent-mid));
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#000; flex-shrink:0;
  }

  /* ═══════════════════════════════════════
     SCREENSHOTS & SPLIT LAYOUT
  ═══════════════════════════════════════ */
  .screenshots-row { display:flex; gap:14px; justify-content:center; margin:14px auto 0; max-width:1000px; flex-wrap:wrap; }
  .screenshot-wrap {
    border-radius:12px; overflow:hidden; border:1px solid var(--border);
    cursor:zoom-in; transition:border-color .25s, transform .25s; flex:1; min-width:0; max-width:480px;
  }
  .screenshot-wrap:hover { border-color:var(--border-hover); transform:translateY(-2px); }
  .screenshot-wrap img { width:100%; height:auto; display:block; }
  .screenshot-caption { font-size:11px; color:var(--text-muted); text-align:center; padding:6px 12px; background:rgba(0,0,0,.4); }

  .slide-split { display:grid; grid-template-columns:1fr 1fr; gap:28px; width:100%; max-width:1040px; margin:20px auto 0; align-items:center; }
  .slide-split-text { display:flex; flex-direction:column; gap:10px; }
  .slide-split-img { border-radius:16px; overflow:hidden; border:1px solid var(--border); cursor:zoom-in; transition:border-color .25s; }
  .slide-split-img:hover { border-color:var(--border-hover); }
  .slide-split-img img { width:100%; height:auto; display:block; }

  /* ═══════════════════════════════════════
     LIGHTBOX
  ═══════════════════════════════════════ */
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:9998; align-items:center; justify-content:center; backdrop-filter:blur(8px); cursor:zoom-out; }
  #lightbox.on { display:flex; }
  #lightbox img { max-width:90vw; max-height:88vh; border-radius:10px; box-shadow:0 0 80px rgba(0,0,0,.8); }
  #lb-close { position:fixed; top:24px; right:32px; font-size:28px; color:#666; cursor:pointer; z-index:9999; background:none; border:none; line-height:1; }
  #lb-close:hover { color:#F5A623; }

  /* ═══════════════════════════════════════
     POPOVER (small centred modal)
  ═══════════════════════════════════════ */
  #popover { display:none; position:fixed; inset:0; z-index:9997; align-items:center; justify-content:center; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); cursor:pointer; }
  #popover.on { display:flex; }
  #popover-card { background:#111; border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; box-shadow:0 24px 80px rgba(0,0,0,.7); max-width:580px; width:90vw; cursor:default; position:relative; }
  #popover-card img { width:100%; height:auto; border-radius:10px; display:block; }
  #popover-close { position:absolute; top:-12px; right:-12px; width:28px; height:28px; border-radius:50%; background:#222; border:1px solid rgba(255,255,255,.15); color:#aaa; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
  #popover-close:hover { background:#E8711A; border-color:#E8711A; color:#fff; }

  /* ═══════════════════════════════════════
     NAVIGATION
  ═══════════════════════════════════════ */
  .nav-arrow {
    position:fixed; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border-radius:50%;
    background:var(--nav-bg); border:1px solid var(--nav-border);
    color:var(--text-muted); font-size:18px; cursor:pointer; z-index:100;
    display:flex; align-items:center; justify-content:center;
    transition:all .25s ease; user-select:none; backdrop-filter:blur(10px);
  }
  .nav-arrow:hover { background:rgba(var(--accent-rgb),.15); border-color:rgba(var(--accent-rgb),.45); color:var(--accent); }
  .nav-arrow:active { transform:translateY(-50%) scale(.93); }
  .nav-arrow.prev { left:20px; }
  .nav-arrow.next { right:20px; }
  .nav-arrow.hidden { opacity:0; pointer-events:none; }

  .nav-dots {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:100;
    background:var(--nav-bg); backdrop-filter:blur(10px);
    padding:8px 16px; border-radius:20px; border:1px solid var(--nav-border);
  }
  .nav-dot { width:6px; height:6px; border-radius:50%; background:var(--dot-inactive); cursor:pointer; transition:all .3s ease; }
  .nav-dot.active { background:var(--accent); width:20px; border-radius:3px; }
  .slide-counter { position:fixed; bottom:33px; right:44px; font-size:11px; color:var(--counter); z-index:100; font-weight:500; letter-spacing:.05em; }

  /* Preview badge */
  .preview-badge {
    position:fixed; top:18px; left:50%; transform:translateX(-50%);
    z-index:200; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:rgba(245,166,35,.55); background:rgba(245,166,35,.06); border:1px solid rgba(245,166,35,.15);
    border-radius:100px; padding:4px 14px; pointer-events:none;
  }

  #peSaveBtn, #peSaveAllBtn {
    position:fixed; top:14px; z-index:201;
    padding:5px 14px; border-radius:100px; cursor:pointer;
    background:rgba(245,166,35,.08); border:1px solid rgba(245,166,35,.25);
    color:rgba(245,166,35,.7); font-size:10px; font-weight:700;
    letter-spacing:.06em; font-family:inherit; transition:all .2s;
  }
  #peSaveBtn    { right:18px; }
  #peSaveAllBtn { right:130px; }
  #peSaveBtn:hover, #peSaveAllBtn:hover { background:rgba(245,166,35,.18); color:#F5A623; border-color:rgba(245,166,35,.5); }

  #peShareBtn {
    position:fixed; top:50%; transform:translateY(-50%); right:72px; z-index:100;
    width:44px; height:44px; border-radius:50%;
    background:var(--nav-bg); border:1px solid var(--nav-border);
    color:var(--text-muted); cursor:pointer;
    backdrop-filter:blur(10px); font-family:inherit;
    display:flex; align-items:center; justify-content:center; transition:all .25s ease;
  }
  #peShareBtn:hover { background:rgba(var(--accent-rgb),.15); border-color:rgba(var(--accent-rgb),.45); color:var(--accent); }

  /* ═══════════════════════════════════════
     ENTRY ANIMATIONS
  ═══════════════════════════════════════ */
  .anim-in { opacity:0; transform:translateY(16px); animation:fadeUp .5s ease forwards; }
  .anim-in:nth-child(1){animation-delay:.08s} .anim-in:nth-child(2){animation-delay:.16s}
  .anim-in:nth-child(3){animation-delay:.24s} .anim-in:nth-child(4){animation-delay:.32s}
  .anim-in:nth-child(5){animation-delay:.40s} .anim-in:nth-child(6){animation-delay:.48s}
  .anim-in:nth-child(7){animation-delay:.56s} .anim-in:nth-child(8){animation-delay:.64s}
  .anim-in:nth-child(9){animation-delay:.72s}

  /* ═══════════════════════════════════════
     MOBILE
  ═══════════════════════════════════════ */
  /* ═══════════════════════════════════════
     TABLET  769–1024px
  ═══════════════════════════════════════ */
  @media(max-width:1024px) and (min-width:769px){
    .slide.content { padding:52px 40px 80px; }
    .cards-row { gap:12px; }
    .kpi-row { grid-template-columns:repeat(2,1fr); gap:12px; }
    .two-col { gap:16px; }
    h1.slide-title { font-size:clamp(26px,3.5vw,44px); }
  }

  /* ═══════════════════════════════════════
     MOBILE  ≤768px
  ═══════════════════════════════════════ */
  @media(max-width:768px){
    .preview-badge { top:66px; }
    .slide.hero { padding:0 20px 88px 20px; }
    .hero-logo { left:20px; top:20px; height:28px; }
    .logo-row { right:20px !important; left:auto !important; top:20px !important; gap:10px !important; }
    .logo-row img:first-child { height:20px !important; }
    .logo-row span { height:20px !important; }
    .logo-row img:last-of-type { height:36px !important; }
    .hero-bg { object-position:center center !important; }
    .hero-content h1 { font-size:clamp(28px,8vw,48px); }
    .slide.content { padding:52px 20px 88px; padding-bottom:88px !important; }
    .cards-row { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns:repeat(2,1fr); gap:10px; }
    .two-col { grid-template-columns:1fr; }
    .integration-grid { grid-template-columns:repeat(2,1fr); }
    .nav-arrow.prev { left:8px; }
    .nav-arrow.next { right:8px; }
    .glow-orb { display:none; }
    .slide-logo { top:14px; left:14px; height:20px; }
    .slide-logo-row { top:14px; left:14px; gap:7px; }
    .slide-logo-row img:first-child { height:18px; }
    .slide-logo-sep { height:20px; }
    .slide-logo-ls  { height:32px; }
    .cta-box { padding:28px 20px; }
    h1.slide-title { font-size:clamp(22px,6vw,38px); }
    .feature-text { font-size:13px; }
    .slide-split { grid-template-columns:1fr; }
    .screenshots-row { flex-direction:column; }
    .screenshot-wrap { max-width:100%; }
  }
</style>
</head>

<body>

<!-- Ambient glow -->
<div class="glow-orb a"></div>
<div class="glow-orb b"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">&#x2715;</button>
  <img id="lb-img" src="" alt="">
</div>

<!-- Popover (small centred modal) -->
<div id="popover" onclick="closePopover()">
  <div id="popover-card" onclick="event.stopPropagation()">
    <button id="popover-close" onclick="closePopover()">&#x2715;</button>
    <img id="popover-img" src="" alt="">
  </div>
</div>

<!-- Preview label -->
<div class="preview-badge">Slide Library Preview — LineScanner</div>

<!-- Navigation -->
<button class="nav-arrow prev hidden" id="prevBtn">&#8592;</button>
<button class="nav-arrow next" id="nextBtn">&#8594;</button>
<div class="nav-dots" id="navDots"></div>
<div class="slide-counter" id="slideCounter"></div>
<button id="peShareBtn" onclick="if(window.PE) PE.openShare()" title="Share this presentation"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>

<!-- Editor-only controls -->
<button id="peSaveBtn" onclick="if(window.PE) PE.saveSlide()" title="Save current slide to source file">💾 Save slide</button>
<button id="peSaveAllBtn" onclick="if(window.PE) PE.saveAllSlides()" title="Save all slides to source files">💾 Save all</button>

<!-- Slides injected here by fetch() — edit the snippet files in linescanner/ -->
<div class="slides-container" id="slidesContainer"></div>

<script src="editor.js"></script>
<script>
  // ── Show Save All result that survived a Live Server reload ──
  (function () {
    try {
      var saved = localStorage.getItem('pe-save-result');
      if (saved) {
        localStorage.removeItem('pe-save-result');
        var r = JSON.parse(saved);
        setTimeout(function () {
          if (window.PE && PE._showSaveToast) PE._showSaveToast(r.msg, r.err);
        }, 1200); // wait for editor.js to initialise
      }
    } catch (e) {}
  })();

  // ── Lightbox ──
  function openLb(src) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lightbox').classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    document.getElementById('lightbox').classList.remove('on');
    document.getElementById('lb-img').src = '';
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLb(); closePopover(); } });

  // ── Popover ──
  function openPopover(src) {
    document.getElementById('popover-img').src = src;
    document.getElementById('popover').classList.add('on');
  }
  function closePopover() {
    document.getElementById('popover').classList.remove('on');
    document.getElementById('popover-img').src = '';
  }

  // ── Dynamic Slide Loader ──
  // Fetches each snippet file, rewrites asset paths for the preview context,
  // injects the HTML into the container, then initialises navigation.
  const SLIDE_FILES = [
    'linescanner/slide-01-cover.html',
    'linescanner/slide-02-company.html',
    'linescanner/slide-03-why.html',
    'linescanner/slide-04-linescanner.html',
    'linescanner/slide-05-technology.html',
    'linescanner/slide-06-surface.html',
    'linescanner/slide-07-dimension.html',
    'linescanner/slide-08-screenprinting.html',
    'linescanner/slide-09-logo-check.html',
    'linescanner/slide-10-database.html',
    'linescanner/slide-11-sensitivity.html',
    'linescanner/slide-12-footprint.html',
    'linescanner/slide-13-integrations.html',
    'linescanner/slide-14-cta.html'
  ];

  const IMG_BASE = 'linescanner/Slide Images/';

  function fixPaths(html) {
    return html
      // Rewrite src="Slide Images/..." → src="linescanner/Slide Images/..." (slide-relative paths)
      .replace(/src="Slide Images\//g, 'src="' + IMG_BASE)
      // Rewrite src="assets/..." → src="linescanner/Slide Images/..."
      .replace(/src="assets\//g, 'src="' + IMG_BASE)
      // Rewrite CSS background-image url('assets/...' and url("assets/...
      .replace(/url\('assets\//g, "url('" + IMG_BASE)
      .replace(/url\("assets\//g, 'url("' + IMG_BASE)
      // Rewrite lightbox calls: openLb('assets/...' → openLb('linescanner/Slide Images/...
      .replace(/openLb\('assets\//g, "openLb('" + IMG_BASE)
      // Rewrite popover calls: openPopover('assets/...' → openPopover('linescanner/Slide Images/...
      .replace(/openPopover\('assets\//g, "openPopover('" + IMG_BASE)
      // Rewrite general/ → linescanner/General Slide Images/GENERAL Softsolution-LiteSentry 25-09v16 Extended/
      .replace(/src="general\//g, 'src="linescanner/General Slide Images/GENERAL Softsolution-LiteSentry 25-09v16 Extended/')
      .replace(/openLb\('general\//g, "openLb('linescanner/General Slide Images/GENERAL Softsolution-LiteSentry 25-09v16 Extended/")
      // Replace customer logo placeholder with the Softsolution preview logo
      .replace(/logo-\[customer\]\.jpg/g, 'LOGO SoftSolution.png')
      // Replace LiteSentry logo placeholder with the actual file name
      .replace(/logo-litesentry\.png/g, 'LOGO LiteSentry Greys.png')
      // Catch-all: rewrite 'assets/ and "assets/ in JS strings (e.g. DEFECTS array src values)
      .replace(/(['"])assets\//g, '$1' + IMG_BASE)
      // Catch-all: rewrite 'general/ and "general/ in JS strings
      .replace(/(['"])general\//g, '$1linescanner/General Slide Images/GENERAL Softsolution-LiteSentry 25-09v16 Extended/');
  }

  const container = document.getElementById('slidesContainer');

  /* ── Slide-01 gallery (defined here because slide scripts don't execute
         when injected via createContextualFragment in some browsers) ── */
  function initSlide01Gallery() {
    var _idx = 0;
    var _timer = null;
    function _overlay() { return document.getElementById('ls1GalleryOverlay'); }
    function _track()   { return document.getElementById('ls1CarTrack'); }
    function _count()   { return _track() ? _track().querySelectorAll('.ls1-car-slide').length : 0; }
    function _go(idx)   {
      if (!_track()) return;
      _idx = (idx + _count()) % _count();
      _track().style.transform = 'translateX(' + (-_idx * 100) + '%)';
    }
    function _startTimer() {
      _stopTimer();
      _timer = setInterval(function () { _go(_idx + 1); }, 3000);
    }
    function _stopTimer() {
      if (_timer) { clearInterval(_timer); _timer = null; }
    }
    window.ls1OpenGallery  = function () { _go(0); var o = _overlay(); if (o) o.style.display = 'flex'; _startTimer(); };
    window.ls1CloseGallery = function () { var o = _overlay(); if (o) o.style.display = 'none'; _stopTimer(); };
    window.ls1CarMove      = function (dir) { _go(_idx + dir); _startTimer(); }; // reset timer on manual nav
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') window.ls1CloseGallery(); });
    document.addEventListener('click',   function (e) { if (e.target === _overlay()) window.ls1CloseGallery(); });
  }

  Promise.all(SLIDE_FILES.map(f => fetch(f).then(r => {
    if (!r.ok) throw new Error('Failed to load ' + f);
    return r.text();
  })))
  .then(parts => {
    // createContextualFragment executes <script> tags inside injected HTML
    const frag = document.createRange().createContextualFragment(parts.map(fixPaths).join('\n'));
    container.appendChild(frag);
    initSlide01Gallery();
    initPresentation();
    if (window.PE) {
      PE.initAll();
      // Tag each slide with its source filename so editor.js can save back to it
      document.querySelectorAll('.slide').forEach((slide, i) => {
        const file = SLIDE_FILES[i];
        if (file) slide.dataset.peSourceFile = file.split('/').pop();
      });
      // Expose path mappings so editor.js can reverse them on save
      // Order matters: longer strings first to avoid partial replacements
      PE.config.pathMappings = [
        ['linescanner/General Slide Images/GENERAL Softsolution-LiteSentry 25-09v16 Extended/', 'general/'],
        ['linescanner/Slide Images/', 'assets/'],
        ['LOGO SoftSolution.png', 'logo-[customer].jpg'],
        ['LOGO LiteSentry Greys.png', 'logo-litesentry.png']
      ];
    }
  })
  .catch(err => {
    container.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;">' +
      '<p style="color:#f87171;font-size:15px;">Could not load slides: ' + err.message + '</p>' +
      '<p style="color:#888;font-size:13px;">Make sure you are using Live Server, not opening the file directly.</p>' +
      '</div>';
  });

  function initPresentation() {
    const slides    = document.querySelectorAll('.slide');
    const dotsEl    = document.getElementById('navDots');
    const counterEl = document.getElementById('slideCounter');
    const prevBtn   = document.getElementById('prevBtn');
    const nextBtn   = document.getElementById('nextBtn');
    let current = 0;

    // Ensure only the first slide is active regardless of what's baked into HTML
    slides.forEach((s, i) => s.classList.toggle('active', i === 0));

    // Build nav dots
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'nav-dot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    function updateNav() {
      document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === current));
      counterEl.textContent = (current + 1) + ' / ' + slides.length;
      prevBtn.classList.toggle('hidden', current === 0);
      nextBtn.classList.toggle('hidden', current === slides.length - 1);
    }

    function goTo(n) {
      if (n < 0 || n >= slides.length || n === current) return;
      const old = current;
      slides[old].classList.remove('active');
      slides[old].classList.add(n > old ? 'exit-left' : 'exit-right');
      setTimeout(() => slides[old].classList.remove('exit-left', 'exit-right'), 700);
      current = n;
      slides[current].classList.add('active');
      updateNav();
      // Umami: track slide view (fires only when Umami is loaded)
      if (window.umami) umami.track('slide-view', { slide: current + 1, name: SLIDE_FILES[current] });
      slides[current].querySelectorAll('.anim-in').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
    });

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    // Touch swipe
    let _tx = 0, _ty = 0;
    document.addEventListener('touchstart', e => { _tx = e.changedTouches[0].clientX; _ty = e.changedTouches[0].clientY; }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - _tx;
      const dy = e.changedTouches[0].clientY - _ty;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0 && current < slides.length - 1) goTo(current + 1);
        if (dx > 0 && current > 0) goTo(current - 1);
      }
    }, { passive: true });

    updateNav();
  }
</script>
</body>
</html>
