<!-- SLIDE_META {"title":"Logo & Print Control","default":"visible","tags":["linescanner","logo-control","automotive"]} -->
<div class="slide content ls9" style="justify-content:flex-start; align-items:center; padding:52px 80px 0;">
  <div class="slide-logo-row"><img src="assets/LOGO SoftSolution grays.png" alt="Softsolution"><span class="slide-logo-sep"></span><img src="assets/logo-litesentry.png" alt="LiteSentry" class="slide-logo-ls"></div>

  <div class="section-label">Screen Printing &amp; Logo</div>
  <h1 class="slide-title" style="margin-bottom:14px;">Position and <span class="blue">print quality control</span></h1>

  <!-- ── Inline carousel ── -->
  <div class="ls8-carousel anim-in" style="">
    <button class="ls8-arrow ls8-prev" id="ls8-prev" data-umami-event="carousel-prev" data-umami-event-slide="serigrafia" disabled="">‹</button>
    <div class="ls8-viewport" id="ls8-viewport" data-pe-carousel=""></div>
    <button class="ls8-arrow ls8-next" id="ls8-next" data-umami-event="carousel-next" data-umami-event-slide="serigrafia">›</button>
    <div class="ls8-counter" id="ls8-counter">1 / 5</div>
  </div>

  <!-- ── Tags — always above nav ── -->
  <div class="ls8-info anim-in" style="">
    <div class="tag-grid" style="justify-content:center;">
      <span class="tag error">❌ Missing print</span>
      <span class="tag error ls9-tag" data-img="1">📐 Distortion</span>
      <span class="tag warn">💡 Shiny ink</span>
      <span class="tag warn ls9-tag" data-img="2">🔄 Rotation</span>
      <span class="tag error ls9-tag" data-img="3">📍 Out of position</span>
      <span class="tag ls9-tag" data-img="4">⬛ "Filled" items</span>
    </div>
  </div>

  <!-- ── Fullscreen lightbox ── -->
  <div class="ls8-lb" id="ls8-lb" onclick="ls8LbClose()">
    <div class="ls8-lb-inner" onclick="event.stopPropagation()">
      <button class="ls8-lb-close" onclick="ls8LbClose()">×</button>
      <button class="ls8-lb-arr ls8-lb-prev" id="ls8-lb-prev" onclick="ls8LbNav(-1)">‹</button>
      <div class="ls8-lb-stage">
        <img id="ls8-lb-img" src="" alt="">
        <div id="ls8-lb-cap" class="ls8-lb-cap"></div>
      </div>
      <button class="ls8-lb-arr ls8-lb-next" id="ls8-lb-next" onclick="ls8LbNav(1)">›</button>
      <div class="ls8-lb-thumbs" id="ls8-lb-thumbs"></div>
    </div>
  </div>

  <!-- ── Scoped Styles ── -->
  <style>
    .ls9 { height: 100%; }

    /* ── Inline carousel ── */
    .ls8-carousel {
      flex: 1; min-height: 0;
      width: 100%; max-width: 860px;
      position: relative; display: flex; align-items: center;
    }
    .ls8-viewport {
      flex: 1; height: 100%; min-width: 0;
      position: relative; overflow: hidden;
      border-radius: 14px; background: #000;
      border: 1px solid var(--border);
    }
    .ls8-slide {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ls8-slide.active { display: flex; }
    .ls8-slide img {
      flex: 1; min-height: 0;
      width: 100%; object-fit: contain;
      cursor: zoom-in; border-radius: 8px;
      transition: opacity .2s;
    }
    .ls8-slide img:hover { opacity: .85; }
    .ls8-caption {
      flex-shrink: 0; padding: 6px 0 4px;
      font-size: 11px; color: var(--text-muted); letter-spacing: .04em;
    }

    /* Arrows */
    .ls8-arrow {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 50%; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text);
      font-size: 22px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; font-family: inherit; padding: 0; margin: 0 6px;
    }
    .ls8-arrow:hover { background: rgba(232,113,26,.15); border-color: #E8711A; color: #E8711A; }
    .ls8-arrow:disabled { opacity: .2; pointer-events: none; }

    .ls8-counter {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .06em;
    }

    /* ── Tags strip — shrinks to content, always above nav ── */
    .ls8-info {
      flex-shrink: 0;
      width: 100%; max-width: 860px;
      margin-top: 10px;
    }

    /* ── Fullscreen lightbox ── */
    .ls8-lb {
      display: none; position: fixed; inset: 0; z-index: 9950;
      background: rgba(0,0,0,.9); backdrop-filter: blur(14px);
      align-items: center; justify-content: center;
    }
    .ls8-lb.open { display: flex; }
    .ls8-lb-inner {
      position: relative; width: 90vw; max-width: 1000px;
      height: 82vh; display: flex; flex-direction: column; align-items: center;
    }
    .ls8-lb-close {
      position: absolute; top: -14px; right: -14px; z-index: 2;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; font-family: inherit; line-height: 1;
    }
    .ls8-lb-close:hover { background: rgba(255,255,255,.25); }
    .ls8-lb-stage {
      flex: 1; min-height: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .ls8-lb-stage img {
      max-width: 100%; max-height: calc(100% - 36px); object-fit: contain; border-radius: 10px;
    }
    .ls8-lb-cap {
      flex-shrink: 0; padding: 10px 0 4px;
      font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: .04em; text-align: center;
    }
    .ls8-lb-arr {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; font-family: inherit; z-index: 2; line-height: 1;
    }
    .ls8-lb-prev { left: -58px; }
    .ls8-lb-next { right: -58px; }
    .ls8-lb-arr:hover { background: rgba(232,113,26,.4); border-color: #E8711A; }
    .ls8-lb-arr:disabled { opacity: .2; pointer-events: none; }
    .ls8-lb-thumbs {
      flex-shrink: 0; display: flex; gap: 8px; padding: 10px 0 4px; justify-content: center;
    }
    .ls8-lb-thumb {
      width: 56px; height: 38px; border-radius: 6px; overflow: hidden;
      cursor: pointer; opacity: .4; transition: opacity .2s, outline .2s;
      outline: 2px solid transparent; flex-shrink: 0;
    }
    .ls8-lb-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ls8-lb-thumb.active { opacity: 1; outline-color: #E8711A; }
    .ls8-lb-thumb:hover { opacity: .75; }

    /* ── Clickable tags ── */
    .ls9-tag {
      cursor: pointer; transition: all .2s;
    }
    .ls9-tag:hover { outline: 1px solid rgba(232,113,26,.5); }
    .ls9-tag.active { outline: 2px solid #E8711A; opacity: 1 !important; }
  </style>

  <!-- ── Scoped Script ── -->
  <script>
  (function () {

    var IMAGES = [
      { src: 'assets/image89.png', caption: '' },
      { src: 'assets/image90.png', caption: 'Distortion' },
      { src: 'assets/image91.png', caption: 'Rotation' },
      { src: 'assets/image92.png', caption: 'Out of position' },
      { src: 'assets/image96.png', caption: 'Filled items' }
    ];

    var current  = 0;
    var lbIdx    = 0;
    var slide    = document.currentScript.closest('.slide');
    var viewport = document.getElementById('ls8-viewport');
    var prevBtn  = document.getElementById('ls8-prev');
    var nextBtn  = document.getElementById('ls8-next');
    var counter  = document.getElementById('ls8-counter');
    var lb       = document.getElementById('ls8-lb');
    var lbImg    = document.getElementById('ls8-lb-img');
    var lbCap    = document.getElementById('ls8-lb-cap');
    var lbPrev   = document.getElementById('ls8-lb-prev');
    var lbNext   = document.getElementById('ls8-lb-next');
    var lbThumbs = document.getElementById('ls8-lb-thumbs');

    // Build inline slides
    IMAGES.forEach(function (img, i) {
      var slide = document.createElement('div');
      slide.className = 'ls8-slide' + (i === 0 ? ' active' : '');

      var imgEl = document.createElement('img');
      imgEl.src = img.src; imgEl.alt = img.caption || '';
      imgEl.addEventListener('click', function () { lbOpen(i); });
      slide.appendChild(imgEl);

      if (img.caption) {
        var cap = document.createElement('div');
        cap.className = 'ls8-caption';
        cap.textContent = img.caption;
        slide.appendChild(cap);
      }
      viewport.appendChild(slide);
    });

    // Build lightbox thumbnails
    IMAGES.forEach(function (img, i) {
      var t = document.createElement('div');
      t.className = 'ls8-lb-thumb';
      var ti = document.createElement('img');
      ti.src = img.src; ti.alt = '';
      t.appendChild(ti);
      t.addEventListener('click', function () { lbIdx = i; lbRender(); });
      lbThumbs.appendChild(t);
    });

    // Inline render
    function render() {
      counter.textContent = IMAGES.length > 1 ? (current + 1) + ' / ' + IMAGES.length : '';
      prevBtn.disabled = current <= 0;
      nextBtn.disabled = current >= IMAGES.length - 1;
      viewport.querySelectorAll('.ls8-slide').forEach(function (s, i) {
        s.classList.toggle('active', i === current);
      });
      // Sync active tag
      slide.querySelectorAll('.ls9-tag').forEach(function (tag) {
        tag.classList.toggle('active', parseInt(tag.dataset.img) === current);
      });
    }

    // ── Expose addImage API for editor.js ────────────────────────────────────
    viewport._peAddImage = function (src, caption) {
      var img = { src: src, caption: caption };
      IMAGES.push(img);

      var slide = document.createElement('div');
      slide.className = 'ls8-slide';
      var imgEl = document.createElement('img');
      imgEl.src = src; imgEl.alt = caption || '';
      var idx = IMAGES.length - 1;
      imgEl.addEventListener('click', function () { lbOpen(idx); });
      slide.appendChild(imgEl);
      if (caption) {
        var cap = document.createElement('div');
        cap.className = 'ls8-caption'; cap.textContent = caption;
        slide.appendChild(cap);
      }
      viewport.appendChild(slide);

      // Add thumbnail to lightbox
      var t = document.createElement('div');
      t.className = 'ls8-lb-thumb';
      var ti = document.createElement('img'); ti.src = src; ti.alt = '';
      t.appendChild(ti);
      t.addEventListener('click', function () { lbIdx = idx; lbRender(); });
      lbThumbs.appendChild(t);

      render();
    };

    prevBtn.addEventListener('click', function () { if (current > 0) { current--; render(); } });
    nextBtn.addEventListener('click', function () { if (current < IMAGES.length - 1) { current++; render(); } });
    render();

    // Tag click → jump to image
    slide.querySelectorAll('.ls9-tag').forEach(function (tag) {
      tag.addEventListener('click', function () {
        current = parseInt(tag.dataset.img);
        render();
      });
    });

    // Lightbox
    function lbOpen(idx) { lbIdx = idx; lb.classList.add('open'); lbRender(); }
    function lbRender() {
      lbImg.src = IMAGES[lbIdx].src;
      lbCap.textContent = IMAGES[lbIdx].caption || '';
      lbPrev.disabled = lbIdx <= 0;
      lbNext.disabled = lbIdx >= IMAGES.length - 1;
      lbThumbs.querySelectorAll('.ls8-lb-thumb').forEach(function (t, i) {
        t.classList.toggle('active', i === lbIdx);
      });
    }

    window.ls8LbClose = function () { lb.classList.remove('open'); };
    window.ls8LbNav   = function (d) {
      var n = lbIdx + d;
      if (n >= 0 && n < IMAGES.length) { lbIdx = n; lbRender(); }
    };

    document.addEventListener('keydown', function (e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  ls8LbNav(-1);
      if (e.key === 'ArrowRight') ls8LbNav(1);
      if (e.key === 'Escape')     ls8LbClose();
    });

  })();
  </script>

  <script>
  (function () { var s = document.currentScript;
    setTimeout(function () { if (window.PE && s) PE.initSlide(s.closest('.slide')); }, 0); })();
  </script>
</div>
