<!-- SLIDE_META {"title":"Footprint","default":"visible","tags":["linescanner","footprint"]} -->
<div class="slide content ls11" style="justify-content:flex-start; align-items:center; padding:52px 80px 0;">
  <div class="slide-logo-row"><img src="assets/LOGO SoftSolution grays.png" alt="Softsolution"><span class="slide-logo-sep"></span><img src="assets/logo-litesentry.png" alt="LiteSentry" class="slide-logo-ls"></div>

  <div class="section-label">Installation</div>
  <h1 class="slide-title">Modular based — <span class="blue">minimum footprint</span></h1>
  <p class="slide-subtitle" style="margin-bottom:12px; margin-top:-6px;">unique · worldwide</p>

  <!-- ── Diagram + badges ── -->
  <div class="ls11-diagram-wrap anim-in" style="">
    <img class="ls11-diagram" src="general/Slide66.jpg" alt="LineScanner footprint diagram" onclick="ls11LbOpen()" data-umami-event="image-zoom" data-umami-event-slide="footprint" title="Click to enlarge">

    <!-- Spec badges overlaid -->
    <div class="ls11-badge ls11-badge-h">
      <div class="ls11-badge-title">Horizontal</div>
      <div class="ls11-badge-spec">Depth ~475 mm</div>
      <div class="ls11-badge-spec">Individual width as required</div>
    </div>

    <div class="ls11-badge ls11-badge-v">
      <div class="ls11-badge-title">Vertical</div>
      <div class="ls11-badge-spec">Width ~700 mm</div>
      <div class="ls11-badge-spec">Depth only 420 mm</div>
    </div>
  </div>

  <!-- ── Fullscreen lightbox ── -->
  <div class="ls11-lb" id="ls11-lb" onclick="ls11LbClose()">
    <div class="ls11-lb-inner" onclick="event.stopPropagation()">
      <button class="ls11-lb-close" onclick="ls11LbClose()">×</button>
      <img id="ls11-lb-img" src="general/Slide66.jpg" alt="LineScanner footprint diagram">
    </div>
  </div>

  <!-- ── Scoped Styles ── -->
  <style>
    .ls11 { height: 100%; }

    .ls11-diagram-wrap {
      flex: 1; min-height: 0;
      width: 100%; max-width: 860px;
      position: relative;
      margin-bottom: 0;
    }

    .ls11-diagram {
      width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      border-radius: 12px; display: block;
      cursor: zoom-in; transition: opacity .2s;
    }
    .ls11-diagram:hover { opacity: .88; }

    /* Spec badges */
    .ls11-badge {
      position: absolute;
      background: #E8711A; color: #fff;
      border-radius: 20px; padding: 10px 18px;
      display: flex; flex-direction: column; gap: 2px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      pointer-events: none;
    }
    .ls11-badge-title { font-size: 13px; font-weight: 800; letter-spacing: .02em; }
    .ls11-badge-spec  { font-size: 11px; opacity: .9; }

    .ls11-badge-h { top: 12%; right: 4%; }
    .ls11-badge-v { bottom: 12%; left: 26%; }

    /* ── Lightbox ── */
    .ls11-lb {
      display: none; position: fixed; inset: 0; z-index: 9950;
      background: rgba(0,0,0,.92); backdrop-filter: blur(14px);
      align-items: center; justify-content: center;
    }
    .ls11-lb.open { display: flex; }
    .ls11-lb-inner {
      position: relative; max-width: 92vw; max-height: 88vh;
    }
    .ls11-lb-inner img {
      max-width: 92vw; max-height: 88vh;
      object-fit: contain; border-radius: 12px; display: block;
    }
    .ls11-lb-close {
      position: absolute; top: -14px; right: -14px; z-index: 2;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; font-family: inherit; line-height: 1;
    }
    .ls11-lb-close:hover { background: rgba(255,255,255,.25); }
  </style>

  <script>
    window.ls11LbOpen  = function () { document.getElementById('ls11-lb').classList.add('open'); };
    window.ls11LbClose = function () { document.getElementById('ls11-lb').classList.remove('open'); };
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') ls11LbClose();
    });
  </script>

  <script>
  (function () { var s = document.currentScript;
    setTimeout(function () { if (window.PE && s) PE.initSlide(s.closest('.slide')); }, 0); })();
  </script>
</div>
