<!-- SLIDE_META {"title":"Cover","default":"visible","tags":["company"]} -->
<div class="slide hero">
  <!-- SoftSolution + LiteSentry logo row — top left -->
  <div class="slide-logo-row" style="position:absolute; top:22px; left:36px; z-index:10; margin-bottom:0;">
    <img src="assets/LOGO SoftSolution grays.png" alt="Softsolution">
    <span class="slide-logo-sep"></span>
    <img src="assets/logo-litesentry.png" alt="LiteSentry" class="slide-logo-ls">
  </div>

  <!-- Credit line: top right -->
  <span class="softsolution-credit">by GlassQuality.com</span>

  <!-- Customer logo — centered in right half -->
  <div class="ls1-customer-logo">
    <img class="ls1-cust-img" src="assets/LOGO Customer TEST.png" alt="[Customer]"
         onerror="this.classList.add('ls1-cust-img--missing')">
    <label class="ls1-cust-placeholder" for="ls1-logo-file" title="Click to upload logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Customer Logo</span>
      <small>Click to upload</small>
    </label>
    <input type="file" id="ls1-logo-file" accept="image/*" style="display:none;">
  </div>
  <img class="hero-bg" src="assets/Panther Eye.jpeg" alt="" style="object-position:right center;">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="brand-badge">GlassQuality.com · [Product or Products]</div>
    <h1>Quality Inspection<br>for <span class="blue">[Category or Categories] Glass</span></h1>
    <h2>Proposal for [Customer] · [Name], [Title]</h2>
    <div class="click-hint" style="color:rgba(255,255,255,.60);">→ Navigate with arrows or swipe</div>
  </div>

  <!-- ── Gallery button ── -->
  <button class="ls1-gallery-btn" onclick="ls1OpenGallery()" title="Show installation gallery">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Gallery
  </button>

  <!-- ── Gallery overlay — position:fixed escapes the slide stacking context ── -->
  <div class="ls1-gallery-overlay" id="ls1GalleryOverlay" style="display:none;">
    <div class="ls1-gallery-popup">
      <button class="ls1-gallery-close" onclick="ls1CloseGallery()">&#x2715;</button>
      <div class="ls1-car-wrap" id="ls1CarWrap">
        <div class="ls1-car-track" id="ls1CarTrack">
          <div class="ls1-car-slide"><img src="Slide Images/Render Tempering Line.png" alt="Tempering Line"><div class="ls1-car-caption" contenteditable="true" spellcheck="false">Tempering Line</div></div>
          <div class="ls1-car-slide"><img src="Slide Images/Render IG LIne.png" alt="IG Line"><div class="ls1-car-caption" contenteditable="true" spellcheck="false">IG Line</div></div>
          <div class="ls1-car-slide"><img src="Slide Images/Render Automotive Printing Line.png" alt="Automotive Printing Line"><div class="ls1-car-caption" contenteditable="true" spellcheck="false">Automotive Printing Line</div></div>
          <div class="ls1-car-slide ls1-car-slide--text"><div class="ls1-car-phrase" contenteditable="true" spellcheck="false">Phrase 1</div></div>
          <div class="ls1-car-slide ls1-car-slide--text"><div class="ls1-car-phrase" contenteditable="true" spellcheck="false">Phrase 2</div></div>
          <div class="ls1-car-slide ls1-car-slide--text"><div class="ls1-car-phrase" contenteditable="true" spellcheck="false">Phrase 3</div></div>
        </div>
        <button class="ls1-car-prev" onclick="ls1CarMove(-1)">&#8249;</button>
        <button class="ls1-car-next" onclick="ls1CarMove(1)">&#8250;</button>
      </div>
    </div>
  </div>

  <!-- ── Scoped Styles ── -->
  <style>
    /* ── Customer logo — centered in right half ── */
    .ls1-customer-logo {
      position: absolute;
      left: 75%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      padding: 28px;
      width: clamp(150px, 15vw, 250px);
      height: clamp(150px, 15vw, 250px);
    }
    .ls1-cust-img {
      width: 90%; height: 90%;
      object-fit: contain;
    }
    /* Hide broken image, show placeholder instead */
    .ls1-cust-img--missing { display: none; }
    .ls1-cust-img--missing ~ .ls1-cust-placeholder { display: flex; }

    .ls1-cust-placeholder {
      display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      width: 100%; height: 100%;
      border: 2px dashed rgba(255,255,255,.25);
      border-radius: 16px;
      cursor: pointer;
      color: rgba(255,255,255,.55);
      text-align: center;
      transition: border-color .2s, color .2s;
    }
    .ls1-cust-placeholder:hover {
      border-color: rgba(var(--accent-rgb),.6);
      color: var(--accent);
    }
    .ls1-cust-placeholder span { font-size: 14px; font-weight: 700; letter-spacing: .04em; }
    .ls1-cust-placeholder small { font-size: 11px; opacity: .65; }
    @media (max-width: 768px) {
      .ls1-customer-logo {
        left: 50%;
        top: auto;
        bottom: 100px;
        transform: translateX(-50%);
        width: 160px;
        height: 160px;
        padding: 18px;
      }
    }

    /* ── Gallery button ── */
    .ls1-gallery-btn {
      position: absolute;
      bottom: 64px; right: 32px;
      z-index: 10;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: rgba(0,0,0,.40);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 20px;
      color: rgba(255,255,255,.70);
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background .25s, border-color .25s, color .25s;
      font-family: inherit;
      user-select: none;
    }
    .ls1-gallery-btn:hover {
      background: rgba(var(--accent-rgb), .25);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Gallery overlay — fixed so it escapes the slide stacking context ── */
    .ls1-gallery-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,0,0,.70);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Popup card ── */
    .ls1-gallery-popup {
      position: relative;
      background: rgba(10,10,14,.92);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 32px 96px rgba(0,0,0,.80);
    }

    /* ── Close button ── */
    .ls1-gallery-close {
      position: absolute; top: -14px; right: -14px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(40,40,50,.95);
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.80);
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s;
      z-index: 5;
    }
    .ls1-gallery-close:hover { background: rgba(255,255,255,.20); color: #fff; }

    /* ── Carousel wrapper ── */
    .ls1-car-wrap {
      position: relative;
      width: 760px;
      height: 460px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
    }
    .ls1-car-track {
      display: flex;
      width: 100%;
      height: 460px;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .ls1-car-slide {
      flex: 0 0 100%;
      width: 100%;
      height: 460px;
      position: relative;
      background: #111;
    }
    .ls1-car-slide img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      user-select: none; pointer-events: none;
    }
    .ls1-car-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 18px;
      background: linear-gradient(transparent, rgba(0,0,0,.75));
      color: rgba(255,255,255,.85);
      font-size: 12px; font-weight: 600; letter-spacing: .05em;
      text-align: center;
    }

    /* ── Prev / Next buttons ── */
    .ls1-car-prev, .ls1-car-next {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.50);
      border: 1px solid rgba(255,255,255,.20);
      color: #fff;
      font-size: 26px; line-height: 1;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      z-index: 5;
    }
    .ls1-car-prev { left: 12px; }
    .ls1-car-next { right: 12px; }
    .ls1-car-prev:hover, .ls1-car-next:hover {
      background: rgba(var(--accent-rgb), .60);
    }

    /* ── Text-only slides ── */
    .ls1-car-slide--text {
      background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .ls1-car-phrase {
      color: rgba(255,255,255,.90);
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 700;
      letter-spacing: .04em;
      text-align: center;
      padding: 32px;
      border: 2px dashed rgba(255,255,255,.15);
      border-radius: 16px;
      min-width: 60%;
      line-height: 1.4;
      outline: none;
      transition: border-color .2s;
    }
    .ls1-car-phrase:focus { border-color: rgba(var(--accent-rgb), .60); }

    @media (max-width: 900px) {
      .ls1-car-wrap  { width: 90vw; height: 54vw; }
      .ls1-car-track { height: 54vw; }
      .ls1-car-slide { height: 54vw; }
    }
    @media (max-width: 768px) {
      .ls1-gallery-btn { bottom: 80px; right: 16px; }
    }
  </style>

  <script>
  /* ── Gallery open / close / navigate ── */
  (function () {
    var _idx = 0;

    function _overlay() { return document.getElementById('ls1GalleryOverlay'); }
    function _track()   { return document.getElementById('ls1CarTrack'); }
    function _count()   { return _track().querySelectorAll('.ls1-car-slide').length; }

    function _go(idx) {
      _idx = (idx + _count()) % _count();
      _track().style.transform = 'translateX(' + (-_idx * 100) + '%)';
    }

    window.ls1OpenGallery  = function () { _go(0); _overlay().style.display = 'flex'; };
    window.ls1CloseGallery = function () { _overlay().style.display = 'none'; };
    window.ls1CarMove      = function (dir) { _go(_idx + dir); };

    /* Click on backdrop (not popup) closes gallery */
    document.addEventListener('click', function (e) {
      var ov = _overlay();
      if (ov && e.target === ov) ls1CloseGallery();
    });

    /* Escape key closes gallery */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') ls1CloseGallery();
    });
  })();
  </script>

  <script>
  (function () { var s = document.currentScript;
    setTimeout(function () { if (window.PE && s) PE.initSlide(s.closest('.slide')); }, 0); })();
  </script>
</div>
